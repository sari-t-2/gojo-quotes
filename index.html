<body>
    <div class="container">
        <h1>Infinity in a Click</h1>
        <p id="quote">"Throughout Heaven and Earth, I alone am the honored one."</p>
        <button onclick="newQuote()">Next Lesson</button>
    </div>

    <script>
        const quotes = [
            '"My soul denies it."',
            '"It’ll be fine. I’m the strongest there is, after all."',
            '"Searching for someone to blame is just a pain."',
            '"Domain Expansion: Infinite Void."',
            '"You’re a challenger here. I’m the one who provides the trial."',
            '"Love is the most twisted curse of all."'
        ];

        function newQuote() {
            const random = quotes[Math.floor(Math.random() * quotes.length)];
            document.getElementById('quote').innerText = random;
        }
    </script>
</body>
</html>
